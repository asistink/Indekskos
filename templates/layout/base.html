<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - Indekskos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="text-2xl font-bold text-blue-600">Indekskos</a>
                <nav>
                    <a href="/" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md">Beranda</a>
                    <a href="/admin" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md">Admin</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="min-h-screen">
        {{ template "content" . }}
    </main>

    <footer class="bg-gray-800 text-white mt-12 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>&copy; 2026 Indekskos MVP. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
