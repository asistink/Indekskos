{{ define "content" }}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <!-- Hero Section -->
    <div class="text-center mb-16">
        <h1 class="text-4xl font-extrabold text-gray-900 sm:text-5xl md:text-6xl">
            Cari Kos Impianmu di <span class="text-blue-600">Jogja</span>
        </h1>
        <p class="mt-3 max-w-md mx-auto text-base text-gray-500 sm:text-lg md:mt-5 md:text-xl md:max-w-3xl">
            Temukan berbagai pilihan kos dari yang budget-friendly hingga eksklusif, dekat kampus kesayanganmu.
        </p>
    </div>

    <!-- Search Section -->
    <div class="max-w-3xl mx-auto bg-white rounded-lg shadow p-6 mb-12">
        <form hx-get="/search" hx-target="#search-results" hx-push-url="true" class="flex flex-col md:flex-row gap-4">
            <input type="text" name="q" placeholder="Nama Universitas atau Daerah..." class="flex-1 p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700 transition font-medium">Cari Kos</button>
        </form>
    </div>

    <!-- Filters and Results Grid -->
    <div class="flex flex-col md:flex-row gap-8">
        <!-- Sidebar Filters -->
        <aside class="w-full md:w-64 bg-white p-6 rounded-lg shadow h-fit">
            <h3 class="text-lg font-semibold mb-4">Filter</h3>
            <form hx-get="/search" hx-target="#search-results">
                <!-- Price Range -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Harga / Bulan</label>
                    <input type="number" name="min_price" placeholder="Min" class="w-full mb-2 p-2 border border-gray-300 rounded-md text-sm">
                    <input type="number" name="max_price" placeholder="Max" class="w-full p-2 border border-gray-300 rounded-md text-sm">
                </div>
                <!-- Facilities -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Fasilitas</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" name="facilities" value="AC" class="rounded text-blue-600">
                            <span class="ml-2 text-sm text-gray-600">AC</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="facilities" value="WiFi" class="rounded text-blue-600">
                            <span class="ml-2 text-sm text-gray-600">WiFi</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" name="facilities" value="Kamar Mandi Dalam" class="rounded text-blue-600">
                            <span class="ml-2 text-sm text-gray-600">Kamar Mandi Dalam</span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="w-full bg-gray-100 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-200 transition text-sm font-medium">Terapkan Filter</button>
            </form>
        </aside>

        <!-- Main Results Area -->
        <div id="search-results" class="flex-1">
            <p class="text-gray-500 text-center py-12">Mulai pencarian untuk melihat daftar kos.</p>
        </div>
    </div>
</div>
{{ end }}
