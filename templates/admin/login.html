{{ define "content" }}
<div class="max-w-md mx-auto mt-20 p-6 bg-white shadow-md rounded-md">
    <h2 class="text-2xl font-bold text-center mb-6">Admin Login</h2>
    <form action="/admin/login" method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" name="username" class="w-full px-3 py-2 border rounded-md" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" name="password" class="w-full px-3 py-2 border rounded-md" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">Login</button>
    </form>
</div>
{{ end }}
