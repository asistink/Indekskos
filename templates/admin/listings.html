{{ define "content" }}
<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Manage Listings</h2>
    <a href="/admin/listings/new" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add New Listing</a>
</div>

<div class="bg-white shadow rounded-lg overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200 text-sm">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase">Name & Area</th>
                <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase">Price / Month</th>
                <th class="px-6 py-3 text-center font-medium text-gray-500 uppercase">Available</th>
                <th class="px-6 py-3 text-center font-medium text-gray-500 uppercase">Featured</th>
                <th class="px-6 py-3 text-center font-medium text-gray-500 uppercase">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
            {{ range .Listings }}
            <tr id="listing-{{ .ID }}" class="hover:bg-gray-50">
                <td class="px-6 py-4">
                    <div class="font-bold text-gray-900">{{ .Name }}</div>
                    <div class="text-gray-500">{{ .Area }}</div>
                </td>
                <td class="px-6 py-4">
                    <!-- Inline price edit -->
                    <form hx-put="/admin/listings/{{ .ID }}/price" class="flex gap-2 items-center">
                        <span class="text-gray-500">Rp</span>
                        <input type="number" name="price" value="{{ .PricePerMonth }}" class="w-32 px-2 py-1 border rounded focus:ring-blue-500">
                        <button type="submit" class="text-blue-600 hover:text-blue-800 text-xs font-bold px-2 py-1 bg-blue-50 rounded">Save</button>
                    </form>
                </td>
                <td class="px-6 py-4 text-center">
                    <button hx-put="/admin/listings/{{ .ID }}/availability" hx-swap="outerHTML"
                        class="px-3 py-1 rounded-full text-xs font-bold {{ if .IsAvailable }}bg-green-100 text-green-800{{ else }}bg-red-100 text-red-800{{ end }}">
                        {{ if .IsAvailable }}Available{{ else }}Full{{ end }}
                    </button>
                </td>
                <td class="px-6 py-4 text-center">
                    <button hx-put="/admin/listings/{{ .ID }}/featured" hx-swap="outerHTML"
                        class="px-3 py-1 rounded-full text-xs font-bold {{ if .IsFeatured }}bg-yellow-100 text-yellow-800{{ else }}bg-gray-100 text-gray-800{{ end }}">
                        {{ if .IsFeatured }}Featured{{ else }}Normal{{ end }}
                    </button>
                </td>
                <td class="px-6 py-4 text-center">
                    <a href="/admin/listings/{{ .ID }}/edit" class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</a>
                    <!-- Assuming Delete Listing handler will be added later for CRUD full support -->
                    <button hx-delete="/admin/listings/{{ .ID }}" hx-target="#listing-{{ .ID }}" hx-swap="outerHTML" hx-confirm="Are you sure you want to delete this listing?" class="text-red-600 hover:text-red-900">Delete</button>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ end }}
